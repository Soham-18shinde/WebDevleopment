<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAV bar</title>
    <style>
        /*:root{
            --color:red;
            --textcolor:white;
            --secondarycolor:aqua;


        }*/
        :root{
            --color:rgba(207, 22, 124, 0.829);
            --textcolor:white;
            --secondarycolor:rgb(187, 46, 46);


        }
        *{
            padding: 0px;
            margin: 0;
        }

        body{
            background-color: var(--secondarycolor);
        }
        .nav{ 
            background-color: var(--color);
            color: var(--textcolor);
            
        }
        ul{
            display: flex;
        }
        ul li{
            list-style: none;
            padding: 25px;
        }
        ul li a{
            color: var(--textcolor);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="nav">

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/">About</a></li>
            <li><a href="/">Contact</a></li>
            <li><a href="/">Copyright</a></li>
           
        </ul>
    </div>
        
</body>
</html>
